# Host Nginx config — Mirtanis Events
# Path on server: /etc/nginx/sites-available/mirtanisevents.ro
# Symlink: ln -s /etc/nginx/sites-available/mirtanisevents.ro /etc/nginx/sites-enabled/
#
# This is the BEFORE-CERTBOT version (HTTP only). Certbot will rewrite this
# file in place and add the HTTPS server + HTTP→HTTPS redirect.

server {
    listen 80;
    listen [::]:80;
    server_name mirtanisevents.ro www.mirtanisevents.ro;

    # Body size must match the docker proxy + FastAPI MAX_UPLOAD_MB
    client_max_body_size 20m;

    # ACME challenge for certbot --webroot (optional; --nginx plugin does not need this)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket / HTTP keepalive
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
