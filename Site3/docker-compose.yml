# Local development orchestration.
#
# Usage:
#   1. Copy backend/.env.example → backend/.env and fill in R2 + secrets.
#   2. `docker compose up --build`
#   3. API  → http://localhost:8000   (docs at /docs)
#      DB   → Postgres on :5432 (foto_bugeac / foto_bugeac)
#
# The Angular front-end is NOT containerised here — run it the usual
# way with `npm start` so HMR stays snappy.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: foto_bugeac
      POSTGRES_PASSWORD: foto_bugeac
      POSTGRES_DB: foto_bugeac
    ports:
      - "5432:5432"
    volumes:
      - foto_bugeac_db:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Compose overrides the SQLite default so we use the local Postgres.
      DATABASE_URL: postgresql+psycopg://foto_bugeac:foto_bugeac@db:5432/foto_bugeac
    volumes:
      - ./backend/app:/app/app

volumes:
  foto_bugeac_db:
