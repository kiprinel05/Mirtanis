server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 1024;

  # Hashed build assets (filenames contain a content hash) — cache forever.
  location ~* \.(?:css|js|woff2?|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Static images from public/ keep stable names, so they must be revalidated.
  # Short cache + must-revalidate ensures a changed file is picked up quickly.
  location ~* \.(?:svg|png|jpg|jpeg|webp|avif|gif|ico)$ {
    expires 1h;
    add_header Cache-Control "public, max-age=3600, must-revalidate";
    try_files $uri =404;
  }

  # Proxy API to backend
  location /api/ {
    proxy_pass http://backend:8000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  location /uploads/ {
    proxy_pass http://backend:8000/uploads/;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
