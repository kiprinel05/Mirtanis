<!doctype html>
<html lang="ro">
  <head>
    <meta charset="utf-8" />
    <title>Mirtanis Events — Locație de poveste pe lac pentru nunți & botezuri</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#FCFAF5" />
    <meta name="description" content="Mirtanis Events — locație de poveste pe malul lacului pentru nunți, botezuri, cununii și evenimente private. Cort premium, sală interioară elegantă și priveliști spectaculoase." />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Great+Vibes&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
      rel="stylesheet"
    />

    <meta property="og:title" content="Mirtanis Events — Locație de poveste pe lac" />
    <meta property="og:description" content="Nunți, botezuri și evenimente private pe malul lacului, într-un decor de poveste." />
    <meta property="og:type" content="website" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "EventVenue",
        "name": "Mirtanis Events",
        "description": "Locație premium pe lac pentru nunți, botezuri și evenimente private.",
        "address": { "@type": "PostalAddress", "addressCountry": "RO" }
      }
    </script>
  </head>
  <body>
    <app-root>
      <div id="boot-loader" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(120% 90% at 50% -10%, #ffffff 0%, #fffdf8 42%, #f4ecdd 100%);z-index:9999;">
        <img src="/logo-mare-v2.png" alt="Mirtanis Events" style="width:200px;max-width:56vw;height:auto;filter:drop-shadow(0 8px 24px rgba(154,114,46,.25));animation:boot-pulse 1.8s ease-in-out infinite;" />
      </div>
    </app-root>
    <style>
      @keyframes boot-pulse { 0%,100%{opacity:.8;transform:scale(.99)} 50%{opacity:1;transform:scale(1.01)} }
    </style>
  </body>
</html>
