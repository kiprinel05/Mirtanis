services:
  db:
    image: postgres:16-alpine
    container_name: mirtanis_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mirtanis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mirtanis}
      POSTGRES_DB: ${POSTGRES_DB:-mirtanis_events}
    volumes:
      - mirtanis_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mirtanis} -d ${POSTGRES_DB:-mirtanis_events}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - mirtanis_net

  backend:
    build: ./backend
    container_name: mirtanis_api
    restart: unless-stopped
    env_file: ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - mirtanis_uploads:/app/uploads
    expose:
      - "8000"
    networks:
      - mirtanis_net

  frontend:
    build: ./frontend
    container_name: mirtanis_web
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"
    networks:
      - mirtanis_net

  nginx:
    image: nginx:1.27-alpine
    container_name: mirtanis_proxy
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - mirtanis_uploads:/var/www/uploads:ro
    ports:
      - "127.0.0.1:8080:80"
    networks:
      - mirtanis_net

volumes:
  mirtanis_pg_data:
  mirtanis_uploads:

networks:
  mirtanis_net:
    driver: bridge
